name: Fala Brasil Bot - Publicar Vídeo Diário

on:
  schedule:
    - cron: '0 13 * * *'   # Todo dia às 10h horário de Brasília (UTC-3 = 13h UTC)
  workflow_dispatch:         # Permite rodar manualmente pelo GitHub

jobs:
  publicar-video:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4

      - name: Configurar Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Instalar dependências
        run: pip install openai google-api-python-client google-auth-oauthlib moviepy requests python-dotenv pillow numpy

      - name: Restaurar credenciais do YouTube
        run: |
          echo "${{ secrets.YOUTUBE_CLIENT_SECRETS }}" > client_secrets.json
          echo "${{ secrets.YOUTUBE_TOKEN_B64 }}" | base64 -d > youtube_token.pickle

      - name: Criar arquivo .env
        run: |
          echo "OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}" > .env
          echo "RUNWAY_API_KEY=${{ secrets.RUNWAY_API_KEY }}" >> .env

      - name: Rodar o bot
        run: python fala_brasil_bot.py
