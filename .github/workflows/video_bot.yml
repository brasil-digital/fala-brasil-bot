name: Fala Brasil Bot - Publicar Vídeo Diário

on:
  schedule:
    - cron: '0 13 * * *'   # Todo dia às 10h horário de Brasília (UTC-3 = 13h UTC)
  workflow_dispatch:         # Permite rodar manualmente pelo GitHub

jobs:
  publicar-video:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4

      - name: Configurar Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Instalar dependências
        run: pip install openai google-api-python-client google-auth-oauthlib moviepy requests python-dotenv pillow numpy

      - name: Criar arquivo .env
        run: |
          echo "OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}" > .env
          echo "RUNWAY_API_KEY=${{ secrets.RUNWAY_API_KEY }}" >> .env

      - name: Rodar o bot
        env:
          YOUTUBE_REFRESH_TOKEN: ${{ secrets.YOUTUBE_REFRESH_TOKEN }}
          YOUTUBE_CLIENT_ID: ${{ secrets.YOUTUBE_CLIENT_ID }}
          YOUTUBE_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
        run: python fala_brasil_bot.py
